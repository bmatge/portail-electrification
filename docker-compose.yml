services:
  app:
    build: .
    image: latelier-cadrage-site:latest
    container_name: latelier-cadrage-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/app.db
      - LOG_LEVEL=info
      # Bootstrap admin : ces emails reçoivent un grant `admin global` au
      # boot (idempotent). Indispensable pour la première instance —
      # sinon /admin est inaccessible (self-signup donne `viewer`).
      - BOOTSTRAP_ADMIN_EMAILS=${BOOTSTRAP_ADMIN_EMAILS:-}
      # Mail : on relaie via le mailserver de l'écosystème g3 (container
      # `ecosystem-mailserver` sur le réseau partagé `ecosystem-network`).
      # `PERMIT_DOCKER: network` côté g3 autorise l'envoi sans creds depuis
      # le réseau interne. DKIM/SPF/DMARC sont alignés sur
      # `ecosysteme.matge.com`, donc on envoie depuis cette zone même si
      # l'app vit sur latelier.bercy.matge.com.
      - MAILER_DRIVER=smtp
      - SMTP_HOST=${SMTP_HOST:-ecosystem-mailserver}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_FROM=${SMTP_FROM:-latelier-noreply@ecosysteme.matge.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-L'atelier 🪢}
      # Reply-To optionnel : si défini, une réponse à un magic link arrive
      # ici plutôt que sur la boîte technique latelier-noreply. À mettre
      # dans `.env` du VPS (souvent personnel, ex. bertrand@matge.com).
      - SMTP_REPLY_TO=${SMTP_REPLY_TO:-}
    volumes:
      - app-data:/data
    networks:
      - ecosystem-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=ecosystem-network

      # --- App principale : ${DOMAIN:-latelier.bercy.matge.com} ---
      - traefik.http.routers.latelier.rule=Host(`${DOMAIN:-latelier.bercy.matge.com}`)
      - traefik.http.routers.latelier.entrypoints=${WEBSECURE_ENTRYPOINT:-websecure}
      - traefik.http.routers.latelier.tls=true
      - traefik.http.routers.latelier.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.latelier.loadbalancer.server.port=3000

      # HTTP → HTTPS sur le domaine principal
      - traefik.http.routers.latelier-http.rule=Host(`${DOMAIN:-latelier.bercy.matge.com}`)
      - traefik.http.routers.latelier-http.entrypoints=${WEB_ENTRYPOINT:-web}
      - traefik.http.routers.latelier-http.middlewares=latelier-https-redirect
      - traefik.http.middlewares.latelier-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.latelier-https-redirect.redirectscheme.permanent=true

      # --- Legacy : redirection 301 depuis ${LEGACY_DOMAIN:-portail-elec.matge.com} ---
      - traefik.http.routers.latelier-legacy.rule=Host(`${LEGACY_DOMAIN:-portail-elec.matge.com}`)
      - traefik.http.routers.latelier-legacy.entrypoints=${WEBSECURE_ENTRYPOINT:-websecure}
      - traefik.http.routers.latelier-legacy.tls=true
      - traefik.http.routers.latelier-legacy.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.latelier-legacy.service=latelier
      - traefik.http.routers.latelier-legacy.middlewares=latelier-legacy-redirect
      - traefik.http.middlewares.latelier-legacy-redirect.redirectregex.regex=^https?://[^/]+/(.*)
      - traefik.http.middlewares.latelier-legacy-redirect.redirectregex.replacement=https://${DOMAIN:-latelier.bercy.matge.com}/$${1}
      - traefik.http.middlewares.latelier-legacy-redirect.redirectregex.permanent=true

      # HTTP → HTTPS sur l'ancien domaine (puis le 301 prend le relais)
      - traefik.http.routers.latelier-legacy-http.rule=Host(`${LEGACY_DOMAIN:-portail-elec.matge.com}`)
      - traefik.http.routers.latelier-legacy-http.entrypoints=${WEB_ENTRYPOINT:-web}
      - traefik.http.routers.latelier-legacy-http.middlewares=latelier-https-redirect

  # Sidecar backup : `sqlite3 .backup` quotidien à 03:00, rétention
  # configurable via BACKUP_RETENTION_DAYS (défaut 30). Lit la DB en
  # read-only, écrit dans le volume backup-data — pas de risque pour le
  # WAL de l'app. Cf. docs/ops/sqlite.md.
  backup:
    image: alpine:3.20
    container_name: latelier-cadrage-site-backup
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - app-data:/data:ro
      - backup-data:/backups
      - ./ops/backup.sh:/usr/local/bin/backup.sh:ro
    command: >
      sh -c "apk add --no-cache sqlite tini && /sbin/tini -- /bin/sh -c '
        echo \"0 3 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1\" > /etc/crontabs/root &&
        crond -f -L /var/log/backup.log
      '"

volumes:
  app-data:
  backup-data:

networks:
  ecosystem-network:
    external: true
