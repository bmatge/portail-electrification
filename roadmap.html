<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
  <title>Roadmap fonctionnelle — Outil de cadrage</title>
  <meta name="description" content="Roadmap fonctionnelle du hub : user stories cadrées par échéance et par moment-clé du parcours utilisateur.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/dsfr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/utility/icons/icons.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="roadmap">
  <header role="banner" class="fr-header" data-app-header></header>

  <main role="main" id="main">
    <div class="fr-container fr-py-4w">

      <div class="fr-grid-row fr-mb-3w">
        <div class="fr-col-12">
          <h1 class="fr-h3 fr-mb-1w">Roadmap fonctionnelle</h1>
          <p class="fr-text--lg fr-mb-2w">Vue d'ensemble dérivée de l'arborescence : un nœud apparaît dans la colonne correspondant à son échéance, et chacune de ses améliorations dans la colonne de sa propre échéance.</p>
        </div>
      </div>

      <section class="fr-mb-3w" aria-labelledby="filter-heading">
        <h2 id="filter-heading" class="fr-sr-only">Filtres</h2>
        <div class="fr-grid-row fr-grid-row--gutters fr-grid-row--bottom">
          <div class="fr-col-12 fr-col-md-6">
            <div class="fr-input-group">
              <label class="fr-label" for="search-input">Rechercher un nœud ou une amélioration</label>
              <input class="fr-input" type="search" id="search-input" placeholder="ex. leasing, carte, simulateur…">
            </div>
          </div>
          <div class="fr-col-12 fr-col-md-6">
            <fieldset class="fr-fieldset roadmap-mode" aria-label="Mode de regroupement par ligne">
              <legend class="fr-fieldset__legend fr-text--xs">Lignes</legend>
              <div class="roadmap-mode__buttons">
                <button type="button" class="roadmap-mode__btn roadmap-mode__btn--on" data-mode="types">Types de page</button>
                <button type="button" class="roadmap-mode__btn" data-mode="audiences">Publics cibles</button>
              </div>
            </fieldset>
          </div>
        </div>
        <div id="roadmap-stats" class="roadmap-stats"></div>
        <div id="save-status" class="save-status" aria-live="polite"></div>
      </section>

      <div id="roadmap-board" class="roadmap-board" role="region" aria-label="Tableau roadmap">
        <p class="panel-empty">Chargement de la roadmap…</p>
      </div>

    </div>
  </main>

  <footer class="fr-footer" role="contentinfo" data-app-footer></footer>

  <script src="/assets/layout.js" type="module"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/dsfr.module.min.js"></script>
  <script nomodule defer src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/dsfr.nomodule.min.js"></script>
  <script src="/assets/roadmap.js" type="module"></script>
</body>
</html>
