<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
  <title>Politiques publiques — L'atelier 🪢</title>
  <meta name="description" content="Les 22 mesures du plan d'électrification, par axe, public et échéance.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='90'%3E%F0%9F%AA%A2%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/dsfr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/utility/icons/icons.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="mesures">
  <header role="banner" class="fr-header" data-app-header></header>

  <main role="main" id="main">
    <div class="fr-container fr-py-4w">

      <div class="fr-grid-row fr-mb-3w">
        <div class="fr-col-12">
          <h1 class="fr-h3 fr-mb-1w">Politiques publiques</h1>
          <p class="fr-text--lg fr-mb-0">Les politiques publiques portées par ce projet, classées par axe et échéance. Cliquez sur une mesure pour voir les nœuds du hub qui la portent.</p>
        </div>
      </div>

      <section class="fr-mb-3w" aria-labelledby="filter-heading">
        <h2 id="filter-heading" class="fr-sr-only">Filtres</h2>
        <div class="fr-grid-row fr-grid-row--gutters fr-grid-row--bottom">
          <div class="fr-col-12 fr-col-md-6">
            <div class="fr-input-group">
              <label class="fr-label" for="search-input">Rechercher</label>
              <input class="fr-input" type="search" id="search-input" placeholder="ex. leasing, PAC, bornes…">
            </div>
          </div>
          <div class="fr-col-12 fr-col-md-3">
            <div class="fr-select-group">
              <label class="fr-label" for="axe-filter">Axe</label>
              <select class="fr-select" id="axe-filter">
                <option value="all">Tous les axes</option>
              </select>
            </div>
          </div>
          <div class="fr-col-12 fr-col-md-3">
            <div class="fr-select-group">
              <label class="fr-label" for="audience-filter">Public</label>
              <select class="fr-select" id="audience-filter">
                <option value="all">Tous les publics</option>
              </select>
            </div>
          </div>
        </div>
        <div id="mesures-stats" class="roadmap-stats"></div>
      </section>

      <div id="mesures-board" class="mesures-board" role="region" aria-label="Mesures par échéance">
        <p class="panel-empty">Chargement des mesures…</p>
      </div>

      <div id="mesure-detail" class="mesure-detail" hidden></div>

    </div>
  </main>

  <footer class="fr-footer" role="contentinfo" data-app-footer></footer>

  <script src="/assets/layout.js" type="module"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/dsfr.module.min.js"></script>
  <script nomodule defer src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.0/dist/dsfr.nomodule.min.js"></script>
  <script src="/assets/mesures.js" type="module"></script>
</body>
</html>
